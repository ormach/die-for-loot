<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Die For Loot</title>

        <!-- Share link preview -->
        <meta property="og:title" content="Library Of Morr" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.gatesofmorr.com" />
        <meta property="og:image:url" content="https://www.gatesofmorr.com/img/share-image.png" />
        <meta property="og:image:type" content="image/png" >
        <meta property="og:image:width" content="1200" >
        <meta property="og:image:height" content="1200" >

        <!-- Descriptions -->
        <meta property="og:description" content="A free web rougelike with unique dice based combat system, many interesting items and map events." />
        <meta name="description" content="A free web rougelike with unique dice based combat system, many interesting items and map events.">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- CSS -->
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/main.css">

        <!-- Google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!-- Mono -->
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

        <!-- Grenze -->
        <link href="https://fonts.googleapis.com/css2?family=Grenze:wght@300;400;600;700&display=swap" rel="stylesheet">

        <!-- Inter -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

        <!-- Favicon -->
        <link rel="apple-touch-icon"      sizes="180x180"    href="./favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32"      href="./favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16"      href="./favicon/favicon-16x16.png">
    <!--    <link rel="manifest"                                 href="favicon/manifest.json">-->
        <link rel="mask-icon"                                href="./favicon/safari-pinned-tab.svg" color="#5bbad5">
        <meta name="msapplication-TileColor" content="#da532c">
        <meta name="theme-color" content="#ffffff">
    </head>

    <body>

        <div class="wrapper">

            <!-- Pile Dice -->
            <div class="leftSection">
                <button id="mute" class="audioOn states"></button>
       
                <div id="pileBtn" class="pileIndicator counter"></div>        
                <div id="pile" class="hide">
                    
                </div>        
                <div id="dice"></div>
            </div> 
            <!-- Turn -->
            <button id="turnBtn" class="states" onclick="g.nextTurn(), playSFX('btn')">
                <img src="./img/ui/start-game.png" alt="">
            </button>
            <!-- Cards -->
            <div id="table" class="">
                <div id="1" class="card-container"></div>
                <div id="2" class="card-container"></div>
                <div id="3" class="card-container"></div>
                <div id="4" class="card-container"></div>
                <div id="5" class="card-container"></div>
                <div id="6" class="card-container"></div>
            </div>

                
            <!-- Right buttons -->
            <div class="rightSection">
                <button id="howTo"   class="states" onclick="toggleModal('how')"></button>
                <button id="voidBtn" class="counter states" onclick="toggleModal(`voidModal`)"></button>
                <button id="bagBtn"  class="counter states" onclick="toggleModal(`bagModal`)" ></button>
            </div>


            <!-- MODALS -->
            <!-- Void -->
            <div id="voidModal" class="modal hide">
                <button class="modalCloseBtn" onclick="toggleModal(`voidModal`)">
                    <img src="./img/ui/id=close.png"></img>
                </button>
                
                <div id="void" class="contentArea"></div>
                
                <img src="./img/ui/void-modal-top.png" alt="" style="pointer-events: none; z-index: 103; position: absolute; height: 600px;">
                <img src="./img/ui/void-modal.jpg" alt="" style="position: absolute;height: 600px;">
            </div>

            <!-- Bag -->
            <div id="bagModal" class="modal hide">   
                <button class="modalCloseBtn" onclick="toggleModal(`bagModal`)">
                    <img src="./img/ui/id=close.png"></img>
                </button>
                
                <div id="bag" class="contentArea"></div>

                <img src="./img/ui/bag-modal-top.png" alt="" style="pointer-events: none; z-index: 103; position: absolute; height: 600px;">
                <img src="./img/ui/bag-modal.jpg" alt="" style="position: absolute;height: 600px;">

            </div>

            <!-- Game over -->
            <div id="gameOver" class="modal hide">  
                <p id="runType">Gold</p>

                <div class="score">
                    <p id="scoreInBag">22</p>
                    <p id="totalItems">32</p>
                </div>
                
                <div class="targets">
                    <p id="targetGold">20</p>
                    <p id="targetSilver">20</p>
                    <p id="targetBronze">28</p>
                </div>
                
                <div class="stats">
                    <p id="statBag">28</p>
                    <p id="statVoid">28</p>
                    <p id="statTable">28</p>
                    <p id="statTurns">28</p>
                </div>

                <button id="againBtn" onclick="toggleModal('progress')">
                    <img src="./img/ui/end-btn.png" style="width: 228px;">
                </button>
                
                <img src="./img/ui/end-premade.jpg" alt="" style="z-index: -1; position: absolute;height: 600px;">
            </div>

            <!-- Select stage -->
            <div id="progress" class="modal hide">
                <div class="lineItems">

                    <div>
                        <h1>Epics</h1>
                        <div id="epicsRank"></div>
                        <p>
                            Epics apply various passive effects.<br>
                            +9 items
                        </p>

                        <img 
                            id="epicsLabel"
                            src="./img/progress/id=none.png" 
                            style="height: 24px; position: absolute; right: 12px; bottom: -8px;"
                        >
                    </div>
    
                    <div>
                        <h1>Relics</h1>
                        <div id="relicsRank"></div>
                        <p>
                            Relics can be used to manipulate items.<br>
                            +12 items
                        </p>

                        <img 
                            id="relicsLabel"
                            src="./img/progress/id=none.png" 
                            style="height: 24px; position: absolute; right: 12px; bottom: -8px;"
                        >
                    </div>
    
                    <div>
                        <h1>Tools</h1>
                        <div id="toolsRank"></div>
                        <p>
                            Tools manipulate dice.<br>
                            11 items
                        </p>

                        <img 
                            id="toolsLabel"
                            src="./img/progress/id=none.png" 
                            style="height: 24px; position: absolute; right: 12px; bottom: -4px;"
                        >
                    </div>
                </div>
                
                <p style="position: absolute; left: 12px; bottom: 12px;">Get Silver+ to unlock more items.</p>

                <button 
                    onclick="g.newGame(), toggleModal('progress')"
                    class="base-btn" 
                    style="width:120px; position: absolute; bottom: 12px; right: 12px;" 
                >
                    Play
                </button>

                <img src="./img/progress/progress-bg.jpg" alt="" style="z-index: -1; position: absolute;height: 600px;">

            </div>

            <!-- Help -->
            <div id="how" class="modal hide">

                <button class="modalCloseBtn" onclick="toggleModal(`how`)">
                    <img src="./img/ui/id=close.png"></img>
                </button>
                
                <!-- <div id="bag" class="contentArea"></div> -->

                <img src="./img/ui/how-premade.jpg" alt="" style="position: absolute;height: 600px;">
 
            </div>

            <!-- Selection -->
            <div id="selectionShade" class="hide">
                <div id="selectionContainer"></div>
                <button class="base-btn" onclick="g.selectionMode({mode:'exit'})">
                    Cancel & go back
                </button>
            </div>


            <!-- Scene images -->
            <img id="mover" class="hide">
            <img id="imgBg"    style="pointer-events: none; top: 0px; left: 0px; width: 960px;" class="decoration" src="./img/ui-placeholders/bg.png" alt="">
            <img id="imgPile"  style="pointer-events: none; top: 0px; left: 0px;" class="decoration" src="./img/ui-placeholders/pile.png" alt="">
            
            <img id=""         style="pointer-events: none; bottom: 0px; right: -0px;" class="decoration" src="./img/ui-placeholders/girl 2.png" alt="">
            <img id="imgVoid"  style="pointer-events: none; bottom: 12px; right: -0px;" class="decoration" src="./img/ui-placeholders/void.png" alt="">
            <img id="imgTable" style="pointer-events: none; top: 0px; z-index: 0;" class="decoration" src="./img/ui-placeholders/table.png" alt="">
            <img id=""         style="pointer-events: none; bottom: 0px; right: -8px; z-index: 0;" class="decoration" src="./img/ui-placeholders/bell.png" alt="">
        
            <img id="imgBag"   style="pointer-events: none; bottom: 0px; right: 0px;" class="decoration" src="./img/ui-placeholders/bag.png" alt="">
            <img id="imgGob"   style="pointer-events: none; bottom: 0px; left: 0px;" class="decoration" src="./img/ui-placeholders/goblin.png" alt="">


            <!-- ALERT -->
            <div id="alert-container"></div>
        </div>

        

    </body>

</html>

<!--JS files-->
<script src="js/utility.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>

<script src="js/actionqueue.js"></script>
<script src="js/effects.js"></script>
<script src="js/dice.js"></script>
<script src="js/items.js"></script>

<script src="js/main.js"></script>
